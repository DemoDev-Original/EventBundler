# EventBundler Configuration
# Version: 1.0.0
# Compatible with Minecraft 1.12 - 1.21+

# General Settings
settings:
  # Enable debug messages for developers
  debug: false
  
  # Log all fired events to console (verbose)
  log-events: false
  
  # Auto-save configuration changes
  auto-save: true
  
  # API access level (open, restricted, disabled)
  api-access: open

# Event Categories
# Set 'enabled: false' to disable an entire category
# Individual events can be toggled below

categories:
  transfer:
    enabled: true
    description: "Money, item, and data transfer events"
  
  player:
    enabled: true
    description: "Extended player interaction events"
  
  block:
    enabled: true
    description: "Custom block interaction events"
  
  entity:
    enabled: true
    description: "Enhanced entity behavior events"
  
  combat:
    enabled: true
    description: "Advanced combat system events"
  
  economy:
    enabled: true
    description: "Economic transaction events"
  
  social:
    enabled: true
    description: "Chat, party, and social events"
  
  world:
    enabled: true
    description: "World manipulation events"
  
  admin:
    enabled: true
    description: "Moderation and admin events"
  
  custom:
    enabled: true
    description: "Server-specific custom events"

# Individual Event Configuration
# Format: event-name:
#   enabled: true/false
#   cancellable: true/false (if applicable)
#   async: true/false (fire asynchronously)

